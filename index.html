<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Series Tracker</title>
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <!-- Barra superior -->
    <header class="barra-superior">
        <div class="barra-superior__contenido">
            <h1 class="barra-superior__logo">
                Series<span>Tracker</span>
            </h1>
            <div class="barra-superior__acciones">
                <button class="btn btn--secundario" id="btn-exportar">
                    ↓ Exportar CSV
                </button>
                <button class="btn btn--primario" id="btn-nueva">
                    + Nueva serie
                </button>
            </div>
        </div>
    </header>

    <!-- Contenido principal -->
    <main class="contenedor">
        <!-- Controles de búsqueda y filtros -->
        <div class="controles">
            <div class="buscador">
                <span class="buscador__icono">🔍</span>
                <input 
                    type="text" 
                    class="buscador__input" 
                    id="buscador" 
                    placeholder="Buscar por título..."
                >
            </div>
            <select class="campo__select filtros-compactos" id="filtro-orden" style="max-width: 200px;">
                <option value="creado_en-desc">Más recientes</option>
                <option value="creado_en-asc">Más antiguas</option>
                <option value="titulo-asc">Título (A-Z)</option>
                <option value="titulo-desc">Título (Z-A)</option>
                <option value="calificacion-desc">Mejor calificación</option>
                <option value="calificacion-asc">Peor calificación</option>
            </select>
        </div>

        <!-- Grid de fichas (se llena con JS) -->
        <div class="grid-series" id="grid-series"></div>

        <!-- Estados alternativos -->
        <div class="estado-cargando oculto" id="estado-cargando">
            <div class="spinner"></div>
            <p style="margin-top: 1rem;">Cargando series...</p>
        </div>

        <div class="estado-vacio oculto" id="estado-vacio">
            <h2 class="estado-vacio__titulo">No hay series todavía</h2>
            <p>Agrega tu primera serie con el botón de arriba.</p>
        </div>

        <div class="estado-error oculto" id="estado-error">
            <h2 class="estado-error__titulo">Error al cargar</h2>
            <p id="estado-error-mensaje">No se pudo conectar con el servidor.</p>
        </div>

        <!-- Paginación (se activa cuando haya más de una página) -->
        <div class="paginacion oculto" id="paginacion">
            <button class="btn btn--secundario" id="btn-pagina-anterior">← Anterior</button>
            <span class="paginacion__info" id="paginacion-info">Página 1 de 1</span>
            <button class="btn btn--secundario" id="btn-pagina-siguiente">Siguiente →</button>
        </div>
    </main>

    <!-- Contenedor de modales (se llena con JS) -->
    <div id="modal-contenedor"></div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/detalle.js"></script>
    <script src="js/formulario.js"></script>
    <script src="js/exportar.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
